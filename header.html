<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Header</title>
<style>html,body{margin:0;background:#000;display:grid;place-items:center;height:100%}canvas{border:0}</style>
</head><body><canvas id=c width=1200 height=280></canvas>
<script>
const cv=c,ctx=cv.getContext('2d');
let t=0;const parts=[...Array(80)].map(()=>({x:Math.random()*1200,y:Math.random()*280,r:1+Math.random()*2,v:0.2+Math.random()*0.8}));
function draw(){
t++;
let g=ctx.createLinearGradient(0,0,1200,280);g.addColorStop(0,"#0a0e27");g.addColorStop(1,"#1a0033");
ctx.fillStyle=g;ctx.fillRect(0,0,1200,280);
ctx.strokeStyle="rgba(128,0,255,.08)";
for(let x=0;x<1200;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,280);ctx.stroke();}
for(let y=0;y<280;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(1200,y);ctx.stroke();}
parts.forEach(p=>{p.y-=p.v;if(p.y<0)p.y=280;ctx.fillStyle="rgba(177,156,217,.7)";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();});
function rings(x,y){for(let i=0;i<4;i++){ctx.strokeStyle="rgba(128,0,255,"+(0.4-i*.08)+")";ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,20+i*16+Math.sin(t/20)*3,0,7);ctx.stroke();}}
rings(80,200);rings(1120,80);
ctx.strokeStyle="rgba(128,0,255,.8)";ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(0,140);ctx.lineTo(240,140);ctx.stroke();
ctx.beginPath();ctx.moveTo(960,140);ctx.lineTo(1200,140);ctx.stroke();
ctx.globalAlpha=Math.min(1,t/60);
ctx.font="bold 54px Montserrat,Arial,sans-serif";ctx.fillStyle="#fff";
let off=Math.max(0,200-t*4);ctx.fillText("Luiz Felipe de Oliveira",250-off,125);
ctx.globalAlpha=1;
const txt="Desenvolvedor Full Stack";
let n=Math.min(txt.length,Math.floor((t-60)/3));
ctx.font="26px Montserrat,Arial,sans-serif";ctx.fillStyle="#b19cd9";
ctx.fillText(txt.substring(0,Math.max(0,n)),380,170);
if(Math.floor(t/20)%2)ctx.fillRect(380+ctx.measureText(txt.substring(0,Math.max(0,n))).width+3,148,3,26);
requestAnimationFrame(draw)}
draw();
</script></body></html>
